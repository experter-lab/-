chassis_bridge:
  ros__parameters:
    mode: ardupilot
    cmd_vel_topic: /cmd_vel
    odom_topic: /unused_chassis_odom
    status_topic: /medicine/chassis_status
    base_frame_id: base_link
    odom_frame_id: odom
    publish_odom: false
    publish_tf: false
    control_rate_hz: 30.0
    odom_publish_rate_hz: 10.0
    cmd_timeout_sec: 0.3
    max_linear_speed: 0.20
    max_angular_speed: 0.50
    max_linear_accel: 0.25
    max_angular_accel: 0.60
    wheel_base: 0.34
    track_width: 0.30
    wheel_radius: 0.065
    emergency_stop: true
    serial_port: /dev/ttyUSB1
    serial_baudrate: 115200
    serial_enabled: false
    serial_protocol: placeholder_v1
    serial_write_period_sec: 0.05
    serial_read_timeout_sec: 0.02
    ardupilot_port: /dev/ttyACM0
    ardupilot_baudrate: 115200
    ardupilot_enabled: true
    ardupilot_readonly: true
    ardupilot_control_enabled: false
    ardupilot_status_timeout_sec: 2.0
    ardupilot_source_system: 255
    ardupilot_source_component: 0
    ardupilot_target_system: 1
    ardupilot_target_component: 1
    ardupilot_rc_steering_channel: 1
    ardupilot_rc_throttle_channel: 3
    ardupilot_rc_pwm_min: 1100
    ardupilot_rc_pwm_mid: 1500
    ardupilot_rc_pwm_max: 1900
    ardupilot_rc_send_period_sec: 0.1
    ardupilot_rc_release_on_idle: true
    ardupilot_invert_throttle: false
    ardupilot_invert_steering: false
