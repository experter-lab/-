chassis_bridge:
  ros__parameters:
    mode: ardupilot
    cmd_vel_topic: /cmd_vel
    odom_topic: /unused_chassis_odom
    status_topic: /medicine/chassis_status
    base_frame_id: base_link
    odom_frame_id: odom
    publish_odom: false
    publish_tf: false
    control_rate_hz: 50.0
    odom_publish_rate_hz: 10.0
    cmd_timeout_sec: 0.2
    max_linear_speed: 0.12
    max_angular_speed: 0.15
    max_linear_accel: 0.40
    max_angular_accel: 0.50
    wheel_base: 0.34
    track_width: 0.30
    wheel_radius: 0.065
    emergency_stop: true
    control_authorization_duration_sec: 300.0
    serial_port: /dev/ttyUSB1
    serial_baudrate: 115200
    serial_enabled: false
    serial_protocol: placeholder_v1
    serial_write_period_sec: 0.05
    serial_read_timeout_sec: 0.02
    ardupilot_port: /dev/ttyS9
    ardupilot_baudrate: 921600
    ardupilot_enabled: true
    ardupilot_readonly: false
    ardupilot_control_enabled: true
    ardupilot_status_timeout_sec: 2.0
    ardupilot_source_system: 255
    ardupilot_source_component: 0
    ardupilot_target_system: 1
    ardupilot_target_component: 1
    ardupilot_rc_steering_channel: 1
    ardupilot_rc_throttle_channel: 3
    ardupilot_rc_pwm_min: 1380
    ardupilot_rc_pwm_mid: 1514
    ardupilot_rc_pwm_max: 1620
    ardupilot_rc_steering_pwm_min: 1370
    ardupilot_rc_steering_pwm_mid: 1500
    ardupilot_rc_steering_pwm_max: 1630
    ardupilot_rc_send_period_sec: 0.05
    ardupilot_rc_release_on_idle: false
    ardupilot_invert_throttle: true
    ardupilot_invert_steering: true
